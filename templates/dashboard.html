<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Secure Data Gateway – InfoSec Dashboard</title>
  <style>
    /* 深色背景 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #58a6ff; font-family: 'Courier New', monospace; padding: 32px; }

    /* 標題 */
    h1 { color: #f7f9fb; font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #8b949e; font-size: 0.82rem; margin-bottom: 28px; }

    /* 四個統計dashboard */
    .dashboard { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 18px 28px; flex: 1; min-width: 130px; text-align: center; }
    .card .num { font-size: 2.2rem; font-weight: bold; color: #58a6ff; }
    .card .label { font-size: 0.75rem; color: #8b949e; margin-top: 6px; }
    .card.red .num { color: #f85149; }

    /* 威脅警示 */
    #threat-banner { display: none; border: 1px solid #f85149; border-radius: 8px; padding: 14px 20px; color: #f85149; font-size: 0.9rem; margin-bottom: 24px; animation: blink 0.8s infinite; }
    @keyframes blink { 0%,100% { background: #1a0a0a; } 50% { background: #2d1b1b; } }

    /* 小標題 */
    .section-title { color: #8b949e; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

    /* Live Traffic visualiser */
    .visualiser { display: flex; gap: 24px; margin-bottom: 36px; }
    .traffic-panel { flex: 1; }

    /* 表格樣式 */
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin-bottom: 32px; }
    th { background: #161b22; color: #8b949e; padding: 6px 10px; text-align: left; border-bottom: 1px solid #30363d; white-space: nowrap; }
    td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
    tr:hover { background: #161b22; }
    .token-cell { color: #58a6ff; font-size: 0.7rem; }
    .empty { color: #444c56; font-size: 0.78rem; }

    /* 資料庫標題 */
    .db-title { font-size: 0.85rem; color: #58a6ff; margin: 28px 0 12px 0; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
    .db-desc { font-size: 0.72rem; color: #8b949e; margin-bottom: 12px; }

  </style>
</head>
<body>

  <!-- 標題區 -->
  <h1> InfoSec Dashboard</h1>

  <!-- 警示橫幅 -->
  <div id="threat-banner">
    🚨 THREAT DETECTED — PII may bypass!
  </div>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="card"><div class="num" id="s-total">0</div><div class="label">Total Requests</div></div>
    <div class="card"><div class="num" id="s-clean">0</div><div class="label">Clean Requests</div></div>
    <div class="card red"><div class="num" id="s-threat">0</div><div class="label">PII Detected</div></div>
  </div>

<!-- Live Traffic Visualiser -->
  <h1 style="color:#fbfcfc; font-size:1.4rem; margin-bottom:12px;"> Live Traffic Visualiser</h1>
  <div class="visualiser">

<!-- 左邊：Dirty JSON -->
<div class="traffic-panel">
  <div class="section-title">Dirty JSON</div>
  <div id="dirty-body"></div>
</div>

<!-- 右邊：Clean JSON -->
<div class="traffic-panel">
  <div class="section-title">Clean JSON</div>
  <div id="clean-body"></div>
</div>

  </div>

  <!--IdentityVault -->
  <div class="db-title">🔴 IdentityVault</div>
  <table>
    <thead id="vault-head"></thead>
    <tbody id="vault-body"></tbody>
  </table>

  <!--ApiTrafficLogs：Gateway-->
  <div class="db-title">🟡 ApiTrafficLogs</div>
  <table>
  <thead id="log-head"></thead>
  <tbody id="log-body"></tbody>
  </table>

  <!-- TelemetryLogs-->
  <div class="db-title">🟢 TelemetryLogs</div>
  <table>
    <thead id="tele-head"></thead>
    <tbody id="tele-body"></tbody>
  </table>

  <!-- JavaScript -->
  <script>
    let count = 0; // 記錄手動送出的筆數
    const dirtyBody = document.getElementById('dirty-body');
    const cleanBody = document.getElementById('clean-body');

    // ── 載入資料庫資料並更新 Dashboard ───────────────────────────
    async function loadTables() {
      // 自動從 API 回傳的 key 產生表頭，不用手刻
      function renderTable(tbodyId, rows, theadId) {
        if (rows.length === 0) return;
        const keys = Object.keys(rows[0]);
        document.getElementById(theadId).innerHTML =
          '<tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr>';
        document.getElementById(tbodyId).innerHTML = rows.map(r =>
          '<tr>' + keys.map(k => `<td>${r[k]}</td>`).join('') + '</tr>'
        ).join('');
      }

      // 從三個資料庫撈資料
      const logs  = await fetch('/api/logs').then(r => r.json());
      const tele  = await fetch('/api/telemetry').then(r => r.json());
      const vault = await fetch('/api/vault').then(r => r.json());

      // 渲染三個表格
      renderTable('log-body',   logs,  'log-head');
      renderTable('tele-body',  tele,  'tele-head');
      renderTable('vault-body', vault, 'vault-head');

      // 更新統計卡片
      const threats = logs.filter(r => r.pii_detected_flag).length;
      document.getElementById('s-total').textContent  = logs.length;
      document.getElementById('s-threat').textContent = threats;
      document.getElementById('s-clean').textContent  = logs.length - threats;
    }

    // 頁面載入時先撈一次資料
    loadTables();

    // ── 每 3 秒自動更新（支援 test.py 自動送資料）────────────────
    setInterval(async () => {
      // 更新資料庫表格和統計卡片
      loadTables();

      // 撈最新一筆請求，更新 Live Traffic Visualiser
      const recent = await fetch('/api/recent').then(r => r.json());
      if (Object.keys(recent).length > 0) {
        // 顯示最新 Dirty JSON
        dirtyBody.innerHTML = '';
        const dirtyBlock = document.createElement('pre');
        dirtyBlock.className = 'json-block dirty';
        dirtyBlock.textContent = JSON.stringify(recent.dirty, null, 2);
        dirtyBody.appendChild(dirtyBlock);

        // 顯示最新 Clean JSON
        cleanBody.innerHTML = '';
        const cleanBlock = document.createElement('pre');
        cleanBlock.className = 'json-block clean';
        cleanBlock.textContent = JSON.stringify(recent.clean, null, 2);
        cleanBody.appendChild(cleanBlock);

        // 更新威脅警示橫幅
        document.getElementById('threat-banner').style.display = recent.pii_detected ? 'block' : 'none';
      }
    }, 3000);
</script>

</body>
</html>
